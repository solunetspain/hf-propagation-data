# Añade estos pasos al workflow que ya genera y publica los datos.
# Deben ir DESPUÉS de collect_dxview.py y ANTES del commit/deploy de Pages.

      - name: Build compact DXView summary
        run: |
          python scripts/build_dxview_summary.py

      - name: Collect HamQSL XML
        continue-on-error: true
        run: |
          python scripts/collect_hamqsl.py

