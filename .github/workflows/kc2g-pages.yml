name: HF data and GitHub Pages

on:
  workflow_dispatch:
  schedule:
    - cron: "45 1-23/2 * * *"
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/kc2g-pages.yml"
      - "scripts/**"
      - "tests/**"
      - "requirements.txt"
      - "site/**"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    permissions:
      contents: write
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Collect and validate KC2G
        id: kc2g
        continue-on-error: true
        run: python -m scripts.collect_kc2g

      - name: Restore last valid KC2G regional data
        if: steps.kc2g.outcome != 'success'
        run: |
          git fetch origin generated-data
          mkdir -p public/data public/diagnostics
          git show origin/generated-data:public/data/kc2g-spain.json > public/data/kc2g-spain.json
          git show origin/generated-data:public/diagnostics/kc2g-diagnostic.json > public/diagnostics/kc2g-diagnostic.json
          echo "::warning::KC2G consulta fallida; se usa el último dato regional válido y se conserva su antigüedad."

      - name: Collect and validate DXView
        id: dxview
        continue-on-error: true
        run: python scripts/collect_dxview.py

      - name: Build compact DXView summary
        run: |
          python scripts/build_dxview_summary.py \
            --input public/data/dxview-in91po.json \
            --output public/data/dxview-in91po-summary.json \
            --diagnostic public/diagnostics/dxview-summary-diagnostic.json

      - name: Collect HamQSL XML
        continue-on-error: true
        run: |
          python scripts/collect_hamqsl.py \
            --output public/data/hamqsl-summary.json \
            --diagnostic public/diagnostics/hamqsl-diagnostic.json \
            --last-good public/data/hamqsl-last-good.json

      - name: Collect NOAA SWPC
        continue-on-error: true
        run: python scripts/collect_noaa.py

      - name: Collect modelled QRN risk
        continue-on-error: true
        env:
          AEMET_API_KEY: ${{ secrets.AEMET_API_KEY }}
        run: python scripts/collect_weather_qrn.py --aemet-api-key "$AEMET_API_KEY"

      - name: Collect GIRO cross-check
        continue-on-error: true
        run: python scripts/collect_giro.py

      - name: Collect PSKReporter HF observations
        continue-on-error: true
        run: python scripts/collect_pskreporter.py

      - name: Collect regional PSKReporter HF observations
        continue-on-error: true
        timeout-minutes: 6
        run: python -m scripts.collect_pskreporter_regions

      - name: Collect optional RBN live spots
        continue-on-error: true
        env:
          RBN_TELNET_HOST: ${{ vars.RBN_TELNET_HOST }}
          RBN_TELNET_PORT: ${{ vars.RBN_TELNET_PORT }}
          RBN_TELNET_CALLSIGN: ${{ vars.RBN_TELNET_CALLSIGN }}
        run: python scripts/collect_rbn.py

      - name: Collect regional DXView perspectives
        continue-on-error: true
        run: python -m scripts.collect_dxview_regions

      - name: Validate regional activity artifacts
        continue-on-error: true
        run: |
          test -s public/data/pskreporter-hf-regions.json
          test -s public/diagnostics/pskreporter-regions-diagnostic.json
          test -s public/data/dxview-regions-summary.json
          test -s public/diagnostics/dxview-regions-diagnostic.json

      - name: Build canonical Spanish web report
        run: python scripts/build_pdf_style_report.py

      - name: Restore prediction history
        run: |
          git fetch origin generated-data
          git show origin/generated-data:public/data/prediction-history.json > public/data/prediction-history.json 2>/dev/null || true

      - name: Update prediction history
        run: python scripts/validate_prediction_history.py

      - name: Rebuild canonical report with updated history
        run: python scripts/build_pdf_style_report.py

      - name: Sync web API report
        run: |
          install -D -m 0644 public/data/web-report-es.json site/api/v1/latest.json

      - name: Build reader-friendly exports
        run: python scripts/build_reader_exports.py

      - name: Persist generated data for API consumers
        run: |
          files=(
            public/data/status.json
            public/data/web-report-es.json
            public/data/prediction-history.json
            public/data/kc2g-spain.json
            public/diagnostics/kc2g-diagnostic.json
            public/data/hamqsl-summary.json
            public/diagnostics/hamqsl-diagnostic.json
            public/reader/hamqsl-summary.txt
            public/reader/hamqsl-diagnostic.txt
            public/data/noaa-summary.json
            public/diagnostics/noaa-diagnostic.json
            public/reader/noaa-summary.txt
            public/reader/noaa-diagnostic.txt
            public/data/qrn-spain-summary.json
            public/diagnostics/qrn-diagnostic.json
            public/reader/qrn-spain-summary.txt
            public/reader/qrn-diagnostic.txt
            public/data/giro-spain-summary.json
            public/diagnostics/giro-diagnostic.json
            public/reader/giro-spain-summary.txt
            public/reader/giro-diagnostic.txt
            public/data/rbn-spots.json
            public/diagnostics/rbn-diagnostic.json
            public/data/pskreporter-hf-summary.json
            public/diagnostics/pskreporter-diagnostic.json
            public/reader/pskreporter-hf-summary.txt
            public/reader/pskreporter-diagnostic.txt
            public/data/pskreporter-hf-regions.json
            public/diagnostics/pskreporter-regions-diagnostic.json
            public/reader/pskreporter-hf-regions.txt
            public/reader/pskreporter-regions-diagnostic.txt
            public/data/dxview-regions-summary.json
            public/diagnostics/dxview-regions-diagnostic.json
            public/reader/dxview-regions-summary.txt
            public/reader/dxview-regions-diagnostic.txt
          )
          snapshot="$RUNNER_TEMP/generated-data"
          git fetch origin generated-data
          git worktree add "$snapshot" origin/generated-data
          for file in "${files[@]}"; do
            if [[ -e "$file" ]]; then
              install -D -m 0644 "$file" "$snapshot/$file"
            fi
          done
          cd "$snapshot"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f -- public
          if git diff --cached --quiet; then
            echo "No generated data changes to persist."
            exit 0
          fi
          git commit -m "Update generated HF data"
          git push origin HEAD:generated-data

      - name: Report DXView degradation
        if: steps.dxview.outcome != 'success'
        run: |
          echo "::warning::DXView failed. KC2G will still be published."
          cat public/diagnostics/dxview-diagnostic.json || true

      - name: Prepare web files
        run: |
          cp site/index.html public/index.html
          install -D -m 0644 site/api/v1/latest.json public/api/v1/latest.json
          touch public/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4

# Pages deployment verified for the current site publication.\n# Canonical report rebuild trigger: keep the web consumer on the current 18-block schema.

# Stable scheduled and manual execution: bounded build and deploy times.
