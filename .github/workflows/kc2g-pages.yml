name: HF data and GitHub Pages

on:
  workflow_dispatch:
  schedule:
    - cron: "7,22,37,52 * * * *"
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/kc2g-pages.yml"
      - "scripts/collect_kc2g.py"
      - "scripts/collect_dxview.py"
      - "requirements.txt"
      - "site/**"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect and validate KC2G
        run: python scripts/collect_kc2g.py

      - name: Collect and validate DXView
        id: dxview
        continue-on-error: true
        run: python scripts/collect_dxview.py

      - name: Report DXView degradation
        if: steps.dxview.outcome != 'success'
        run: |
          echo "::warning::DXView failed. KC2G will still be published."
          cat public/diagnostics/dxview-diagnostic.json || true

      - name: Prepare web files
        run: |
          cp site/index.html public/index.html
          touch public/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
