name: HF data and GitHub Pages

on:
  workflow_dispatch:
  schedule:
    - cron: "7,22,37,52 * * * *"
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/kc2g-pages.yml"
      - "scripts/collect_kc2g.py"
      - "scripts/regionalization.py"
      - "tests/test_regionalization.py"
      - "scripts/collect_dxview.py"
      - "scripts/build_dxview_summary.py"
      - "scripts/collect_hamqsl.py"
      - "scripts/build_reader_exports.py"
      - "scripts/collect_noaa.py"
      - "scripts/collect_weather_qrn.py"
      - "scripts/collect_giro.py"
      - "scripts/collect_pskreporter.py"
      - "scripts/build_reader_exports.py"
      - "requirements.txt"
      - "site/**"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Collect and validate KC2G
        run: python scripts/collect_kc2g.py

      - name: Collect and validate DXView
        id: dxview
        continue-on-error: true
        run: python scripts/collect_dxview.py

      - name: Build compact DXView summary
        run: |
          python scripts/build_dxview_summary.py \
            --input public/data/dxview-in91po.json \
            --output public/data/dxview-in91po-summary.json \
            --diagnostic public/diagnostics/dxview-summary-diagnostic.json

      - name: Collect HamQSL XML
        continue-on-error: true
        run: |
          python scripts/collect_hamqsl.py \
            --output public/data/hamqsl-summary.json \
            --diagnostic public/diagnostics/hamqsl-diagnostic.json \
            --last-good public/data/hamqsl-last-good.json

      - name: Collect NOAA SWPC
        continue-on-error: true
        run: python scripts/collect_noaa.py

      - name: Collect modelled QRN risk
        continue-on-error: true
        run: python scripts/collect_weather_qrn.py

      - name: Collect GIRO cross-check
        continue-on-error: true
        run: python scripts/collect_giro.py

      - name: Collect PSKReporter HF observations
        continue-on-error: true
        run: python scripts/collect_pskreporter.py

      - name: Build reader-friendly exports
        run: python scripts/build_reader_exports.py

      - name: Report DXView degradation
        if: steps.dxview.outcome != 'success'
        run: |
          echo "::warning::DXView failed. KC2G will still be published."
          cat public/diagnostics/dxview-diagnostic.json || true

      - name: Prepare web files
        run: |
          cp site/index.html public/index.html
          touch public/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
