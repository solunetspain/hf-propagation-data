<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HF Propagation Data — España e IN91PO</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 1000px; margin: 40px auto; padding: 0 20px; line-height: 1.45; }
    h1, h2 { line-height: 1.15; }
    .card { border: 1px solid #ccc; border-radius: 10px; padding: 18px; margin: 16px 0; }
    .ok { color: #176b2c; font-weight: 700; }
    .error { color: #a61b1b; font-weight: 700; }
    code { background: #f2f2f2; padding: 2px 5px; border-radius: 4px; }
    pre { background: #f5f5f5; padding: 15px; overflow: auto; border-radius: 8px; }
  </style>
</head>
<body>
  <h1>HF Propagation Data — España e IN91PO</h1>
  <p>Datos automáticos de KC2G validados antes de su publicación.</p>

  <div class="card">
    <h2>Estado</h2>
    <div id="status">Cargando…</div>
  </div>

  <div class="card">
    <h2>Archivos JSON</h2>
    <p><a href="data/kc2g-in91po.json">KC2G IN91PO</a></p>
    <p><a href="data/kc2g-spain.json">KC2G España</a></p>
    <p><a href="data/status.json">Estado de validación</a></p>
    <p><a href="diagnostics/kc2g-diagnostic.json">Diagnóstico KC2G</a></p>
  </div>

  <script>
    fetch("data/status.json", {cache: "no-store"})
      .then(r => r.json())
      .then(data => {
        const cls = data.status === "ok" ? "ok" : "error";
        document.getElementById("status").innerHTML =
          `<p class="${cls}">${data.status.toUpperCase()}</p>` +
          `<pre>${JSON.stringify(data, null, 2)}</pre>`;
      })
      .catch(error => {
        document.getElementById("status").innerHTML =
          `<p class="error">No se pudo cargar el estado</p><pre>${error}</pre>`;
      });
  </script>
</body>
</html>
